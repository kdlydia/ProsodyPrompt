<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProsodyPrompt Speech DAW</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ProsodyPrompt Speech DAW</h1>
            <p>Interactive prosody editing with real-time synthesis</p>
        </header>

        <main>
            <!-- Project Loading -->
            <section id="project-section" class="section">
                <h2>Load Project</h2>
                <div class="form-group">
                    <label>TextGrid Path:</label>
                    <input type="text" id="textgrid-path" placeholder="/path/to/recording.TextGrid" />
                </div>
                <div class="form-group">
                    <label>Audio Path (for voice cloning):</label>
                    <input type="text" id="audio-path" placeholder="/path/to/recording.wav" />
                </div>
                <div class="form-group">
                    <label>Speaker Name:</label>
                    <input type="text" id="speaker-name" placeholder="speaker" value="speaker" />
                </div>
                <button id="load-project-btn" onclick="loadProject()">Load Project</button>
                <div id="project-status" class="status"></div>
            </section>

            <!-- Timeline / Syllable Editor -->
            <section id="editor-section" class="section" style="display: none;">
                <h2>Edit Prosody</h2>

                <div class="timeline-container">
                    <div id="timeline" class="timeline"></div>
                </div>

                <!-- Selected Syllable Editor -->
                <div id="syllable-editor" class="syllable-editor" style="display: none;">
                    <h3>Edit Syllable: <span id="syl-text">-</span></h3>

                    <div class="symbol-group">
                        <label>Current Symbol:</label>
                        <input type="text" id="symbol-input" placeholder="e.g., //, ‾, _, *, ?" />
                    </div>

                    <div class="control-group">
                        <label>Height:</label>
                        <button class="toggle-btn" data-value="high" onclick="setHeight(this)">High (‾)</button>
                        <button class="toggle-btn" data-value="mid" onclick="setHeight(this)">Mid</button>
                        <button class="toggle-btn" data-value="low" onclick="setHeight(this)">Low (_)</button>
                    </div>

                    <div class="control-group">
                        <label>Direction:</label>
                        <button class="toggle-btn" data-value="rising" onclick="setDirection(this)">Rising (//)</button>
                        <button class="toggle-btn" data-value="falling" onclick="setDirection(this)">Falling (\\)</button>
                        <button class="toggle-btn" data-value="level" onclick="setDirection(this)">Level (→)</button>
                    </div>

                    <div class="control-group">
                        <label>Accent:</label>
                        <button class="toggle-btn" id="accent-btn" onclick="toggleAccent(this)">Toggle Accent (*)</button>
                    </div>

                    <div class="button-group">
                        <button class="action-btn" onclick="resetSyllable()">Reset</button>
                        <button class="action-btn" onclick="prevSyllable()">&lt; Prev</button>
                        <button class="action-btn" onclick="nextSyllable()">Next &gt;</button>
                    </div>
                </div>

                <!-- Summary -->
                <div id="summary" class="summary"></div>

                <!-- Synthesis Controls -->
                <div class="synthesis-controls">
                    <h3>Synthesis</h3>
                    <div class="form-group">
                        <label>F0 Floor (Hz):</label>
                        <input type="number" id="f0-floor" placeholder="75" />
                    </div>
                    <div class="form-group">
                        <label>F0 Ceiling (Hz):</label>
                        <input type="number" id="f0-ceiling" placeholder="300" />
                    </div>
                    <button id="synthesize-btn" onclick="synthesize()">Synthesize</button>
                    <button id="export-btn" onclick="exportTextGrid()">Export TextGrid</button>
                    <div id="synthesis-status" class="status"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>ProsodyPrompt v0.1 | <a href="/docs">API Docs</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
